name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./cropmind-ai
        file: ./cropmind-ai/Dockerfile
        push: false # Set to true and add registry authentication when ready to push to DockerHub/GitHub Packages
        tags: cropmind-ai:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
